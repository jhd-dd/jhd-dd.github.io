<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoliSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="holisync.png" type="png">
</head>
<body>
    <div class="container">
        <header>
            <div class="flag-banner">
                <div class="flag-stripe stripe-blue"></div>
                <img src="holisync.png">
                <div class="flag-stripe stripe-red"></div>
            </div>
            <h1>Public Holidays<br><span>Calendar Sync</span></h1>
            <p class="subtitle">Sync all PH public holidays directly to your Google Calendar.</p>
        </header>

        <div class="auth">
            <div class="auth-section">
                <button id="authorizeBtn" class="btn btn-primary" disabled>Connect to Google Calendar</button>
                <button id="signoutBtn" class="btn btn-danger hidden">Sign Out</button>
                <div id="authStatus"></div>
            </div>
        </div>

        <div id="mainContent" class="hidden">
            <div class="month-selector">
                <h2>Select Month(s)</h2>
                <p class="month-hint">Click to select one or more months</p>
                <div class="month-grid" id="monthGrid"></div>
                <div class="month-controls">
                    <button class="btn-sm btn-outline" id="selectAllBtn">Select All</button>
                    <button class="btn-sm btn-ghost" id="clearAllBtn">Clear</button>
                </div>
            </div>

            <div class="sync-section">
                <h2>Choose Year</h2>
                <div class="year-selector">
                    <button class="year-btn" id="prevYear">−</button>
                    <input type="number" id="yearInput" min="2020" max="2035" value="2026">
                    <button class="year-btn" id="nextYear">+</button>
                </div>
                <button id="syncBtn" class="btn btn-sync" disabled>Sync to Calendar</button>
            </div>

            <div id="holidaysPreview" class="holidays-preview hidden">
                <div class="holidays-header">
                    <h2>Holidays Preview</h2>
                    <span class="holiday-count" id="holidayCount">0 holidays</span>
                </div>
                <div id="holidaysList"></div>
            </div>
        </div>

        <footer>
            <p>HoliSync 2026</p>
        </footer>
    </div>
    <script src="script.js"></script>
    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()" async defer></script>
    <script src="https://accounts.google.com/gsi/client" onload="gisLoaded()" async defer></script>
</body>
</html>
